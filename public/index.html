<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala · Pão com Linguiça</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Pão com Linguiça</h1>
  <span class="sub">Escala de voluntários · 12 vagas por dia</span>
</header>
<p class="resumo" id="resumo">Carregando…</p>

<div class="filtros">
  <div class="linha-f"><span class="rotulo-f">Dia</span><div id="chipsDia"></div></div>
  <div class="linha-f"><span class="rotulo-f">Turno</span><div id="chipsTurno"></div></div>
  <div class="linha-f"><span class="rotulo-f">Pastoral</span><div id="chipsPastoral"></div></div>
  <div class="linha-f linha-print">
    <span class="rotulo-f">Nome</span>
    <input class="busca" id="busca" placeholder="Buscar e destacar nome…" oninput="render()">
    <div class="direita">
      <button class="btn-print" onclick="togglePrint()" id="btnPrint">📸 Modo print</button>
    </div>
  </div>
</div>

<main id="escala"></main>
<footer>Os dados sincronizam do Google Forms · passe o mouse sobre um nome para destacá-lo em toda a escala.</footer>

<script src="app.js"></script>
</body>
</html>
